<div class="space-y-6 animate-fade-in">
  <!-- Header -->
  <div class="px-6 pt-6 pb-2 flex items-center gap-4">
    <div class="w-10 h-10 rounded-xl bg-gray-900 flex items-center justify-center shrink-0">
      <i class="fas fa-sliders-h text-white text-sm"></i>
    </div>
    <div>
      <h1 class="text-xl font-bold text-gray-900 leading-none">Panel Administrativo</h1>
      <p class="text-sm text-gray-500 mt-0.5">Gestión de equipos, jugadores y partidos</p>
    </div>
  </div>

  <div class="card overflow-hidden">
    <!-- Tab Navigation -->
    <div class="flex border-b border-gray-100">
      <button
        type="button"
        (click)="setTab('teams')"
        class="px-6 py-3 text-sm font-medium border-b-2 transition-colors -mb-px"
        [class]="activeTab() === 'teams'
          ? 'border-gray-900 text-gray-900'
          : 'border-transparent text-gray-500 hover:text-gray-700'"
      >
        <i class="fas fa-users mr-2"></i>Equipos
      </button>
      <button
        type="button"
        (click)="setTab('players')"
        class="px-6 py-3 text-sm font-medium border-b-2 transition-colors -mb-px"
        [class]="activeTab() === 'players'
          ? 'border-gray-900 text-gray-900'
          : 'border-transparent text-gray-500 hover:text-gray-700'"
      >
        <i class="fas fa-user mr-2"></i>Jugadores
      </button>
      <button
        type="button"
        (click)="setTab('matches')"
        class="px-6 py-3 text-sm font-medium border-b-2 transition-colors -mb-px"
        [class]="activeTab() === 'matches'
          ? 'border-gray-900 text-gray-900'
          : 'border-transparent text-gray-500 hover:text-gray-700'"
      >
        <i class="fas fa-futbol mr-2"></i>Partidos
      </button>
    </div>

    <!-- Equipos -->
    @if (activeTab() === 'teams') {
      <app-team-list [id]="id()" />
    }

    <!-- Jugadores -->
    @if (activeTab() === 'players') {
      <div class="p-6 space-y-4">
        <div class="flex items-center gap-3">
          <select
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
            [ngModel]="selectedTeamId()"
            (ngModelChange)="selectedTeamId.set($event)"
          >
            <option value="">-- Selecciona un equipo --</option>
            @for (team of teams(); track team.id) {
              <option [value]="team.id.toString()">{{ team.name }}</option>
            }
          </select>
          @if (selectedTeamId()) {
            <button type="button" (click)="addPlayer()"
              class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium bg-gray-900 text-white rounded-lg hover:bg-gray-700 transition-colors">
              <i class="fas fa-plus text-xs"></i>
              Agregar Jugador
            </button>
          }
        </div>
        @if (selectedTeamId()) {
          <app-player-list [idInput]="id()" [teamIdInput]="selectedTeamId()" />
        } @else {
          <div class="py-10 text-center">
            <i class="fas fa-user-friends text-gray-300 text-3xl mb-3"></i>
            <p class="text-sm text-gray-500">Selecciona un equipo para ver sus jugadores.</p>
          </div>
        }
      </div>
    }

    <!-- Partidos -->
    @if (activeTab() === 'matches') {
      <app-match-list [id]="id()" />
    }
  </div>
</div>
