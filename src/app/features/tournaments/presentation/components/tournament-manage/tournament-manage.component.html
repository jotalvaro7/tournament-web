@if (isLoading()) {
  <div class="flex items-center justify-center py-8">
    <div class="spinner"></div>
  </div>
}

@if (!isLoading() && tournament(); as t) {
  <div class="card px-6 py-4 animate-fade-in">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gray-900 flex items-center justify-center shrink-0">
          <i class="fas fa-trophy text-white text-sm"></i>
        </div>
        <div>
          <div class="flex items-center gap-2">
            <h1 class="text-base font-bold text-gray-900">{{ t.name }}</h1>
            <span class="badge text-xs" [class]="helper.getStatusColor(t.status)">
              {{ helper.getStatusLabel(t.status) }}
            </span>
          </div>
          <p class="text-xs text-gray-500">{{ t.description }}</p>
        </div>
      </div>

      <app-tournament-actions
        [tournament]="t"
        (edit)="onEdit()"
        (start)="onStart()"
        (end)="onEnd()"
        (cancel)="onCancel()"
        (delete)="onDelete()"
      />
    </div>
  </div>
}

@if (!isLoading() && !tournament()) {
  <div class="card p-12">
    <div class="empty-state">
      <i class="fas fa-trophy empty-state-icon"></i>
      <h2 class="empty-state-title">No ha seleccionado ningun torneo</h2>
      <p class="empty-state-description">Selecciona un torneo para ver mas detalles.</p>
    </div>
  </div>
}

@if (showEditModal()) {
  <app-tournament-form-modal
    [tournament]="tournament() ?? null"
    (save)="onSave($event)"
    (close)="onCloseModal()"
  />
}
