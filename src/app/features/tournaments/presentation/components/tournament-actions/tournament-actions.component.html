@if (isAdmin()) {
  <div class="flex items-center gap-1">
    <button type="button" (click)="edit.emit()" class="btn-icon" title="Editar torneo">
      <i class="fas fa-edit text-sm"></i>
    </button>
    <button type="button" (click)="start.emit()"
      class="btn-icon text-emerald-600 hover:bg-emerald-50 hover:text-emerald-700"
      title="Iniciar torneo">
      <i class="fas fa-play text-sm"></i>
    </button>
    <button type="button" (click)="end.emit()" class="btn-icon" title="Finalizar torneo">
      <i class="fas fa-stop text-sm"></i>
    </button>
    <button type="button" (click)="cancel.emit()"
      class="btn-icon text-amber-500 hover:bg-amber-50 hover:text-amber-600"
      title="Cancelar torneo">
      <i class="fas fa-ban text-sm"></i>
    </button>
    <div class="w-px h-4 bg-gray-200 mx-0.5"></div>
    <button type="button" (click)="delete.emit()"
      class="btn-icon hover:text-red-500 hover:bg-red-50"
      title="Eliminar torneo">
      <i class="fas fa-trash text-sm"></i>
    </button>
  </div>
} @else {
  <span class="text-xs text-gray-400 flex items-center gap-1.5">
    <i class="fas fa-eye"></i> Solo lectura
  </span>
}
