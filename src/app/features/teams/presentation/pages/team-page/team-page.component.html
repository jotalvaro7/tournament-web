@if (isLoading()) {
<div class="flex items-center justify-center py-20">
  <div class="spinner"></div>
</div>
}

@if (!isLoading() && team()) {
<div class="space-y-6 animate-fade-in">

  <!-- Header -->
  <div class="card px-6 py-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button type="button" (click)="onBack()" class="btn-icon" title="Volver">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-gray-900">
          <i class="fas fa-shield-alt text-white text-sm"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-900">{{ team()!.name }}</h1>
          <p class="text-sm text-gray-500">DT: {{ team()!.coach }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="card overflow-hidden">
    <div class="flex border-b border-gray-100">
      <button type="button" (click)="setTab('players')"
        class="px-6 py-3 text-sm font-medium border-b-2 transition-colors -mb-px" [class]="activeTab() === 'players'
            ? 'border-gray-900 text-gray-900'
            : 'border-transparent text-gray-500 hover:text-gray-700'">
        <i class="fas fa-user-friends mr-2"></i>Jugadores
      </button>
      <button type="button" (click)="setTab('results')"
        class="px-6 py-3 text-sm font-medium border-b-2 transition-colors -mb-px" [class]="activeTab() === 'results'
            ? 'border-gray-900 text-gray-900'
            : 'border-transparent text-gray-500 hover:text-gray-700'">
        <i class="fas fa-futbol mr-2"></i>Resultados
      </button>
    </div>

    @if (activeTab() === 'results') {
      <app-team-results [id]="id()" [teamId]="teamId()" />
    }
  </div>

  @if (activeTab() === 'players') {
  <app-player-list />
  }

</div>
}
