<div class="flex flex-wrap items-center gap-2">

  <!-- Status -->
  <select
    [value]="status()"
    (change)="status.set($any($event.target).value)"
    class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-700 focus:outline-none focus:ring-1 focus:ring-gray-400"
  >
    @for (option of statusOptions; track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
    }
  </select>

  <!-- Date Type Toggle -->
  <div class="flex rounded-lg border border-gray-200 overflow-hidden text-xs font-medium">
    <button
      (click)="toggleDateRange(false)"
      class="px-3 py-1.5 transition-colors"
      [class.bg-gray-900]="!useDateRange()"
      [class.text-white]="!useDateRange()"
      [class.bg-white]="useDateRange()"
      [class.text-gray-500]="useDateRange()"
    >
      <i class="fas fa-calendar-day mr-1"></i>Fecha
    </button>
    <button
      (click)="toggleDateRange(true)"
      class="px-3 py-1.5 border-l border-gray-200 transition-colors"
      [class.bg-gray-900]="useDateRange()"
      [class.text-white]="useDateRange()"
      [class.bg-white]="!useDateRange()"
      [class.text-gray-500]="!useDateRange()"
    >
      <i class="fas fa-calendar-week mr-1"></i>Rango
    </button>
  </div>

  <!-- Specific Date -->
  @if (!useDateRange()) {
    <input
      type="date"
      [value]="specificDate()"
      (change)="specificDate.set($any($event.target).value)"
      class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gray-400"
    />
  }

  <!-- Date Range -->
  @if (useDateRange()) {
    <input
      type="date"
      [value]="dateFrom()"
      (change)="dateFrom.set($any($event.target).value)"
      class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gray-400"
    />
    <span class="text-gray-300 text-sm">&mdash;</span>
    <input
      type="date"
      [value]="dateTo()"
      (change)="dateTo.set($any($event.target).value)"
      class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gray-400"
    />
  }

  <!-- Search -->
  <button
    (click)="onFilterChange()"
    class="p-1.5 rounded-lg border border-gray-200 text-gray-500 hover:text-gray-900 hover:border-gray-400 transition-colors"
    title="Buscar"
  >
    <i class="fas fa-search text-sm"></i>
  </button>

  <!-- Clear -->
  @if (status() || specificDate() || dateFrom() || dateTo()) {
    <button
      (click)="clearFilters()"
      class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
      title="Limpiar filtros"
    >
      <i class="fas fa-times text-sm"></i>
    </button>
  }

</div>
