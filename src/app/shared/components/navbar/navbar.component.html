<header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
  <div class="flex items-center justify-between px-6 py-3">
    <!-- Left: Logo -->
    <a routerLink="/tournaments" class="text-xl font-bold text-gray-900 hover:text-gray-700 transition-colors">
      Tournament Manager
    </a>

    <!-- Right: Auth -->
    <div class="flex items-center gap-2">
      @if (isAuthenticated()) {
        <!-- Profile button with admin dropdown -->
        <div class="relative">
          <button
            type="button"
            (click)="toggleMenu($event)"
            class="flex items-center gap-2.5 px-2 py-1 rounded-xl hover:bg-gray-50 transition-colors"
          >
            <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-gray-900">
              <span class="text-white text-sm font-bold">
                {{ currentUser()?.username?.charAt(0)?.toUpperCase() }}
              </span>
            </div>
            <div class="hidden sm:block text-left">
              <p class="text-sm font-medium text-gray-900 leading-none">{{ currentUser()?.username }}</p>
              <span
                class="text-xs font-semibold px-1.5 py-0.5 rounded-md mt-0.5 inline-block"
                [class]="isAdmin() ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-500'"
              >
                {{ currentUser()?.role }}
              </span>
            </div>
            @if (isAdmin()) {
              <i class="fas fa-chevron-down text-xs text-gray-400 hidden sm:block transition-transform duration-200"
                [class.rotate-180]="showAdminMenu()"
              ></i>
            }
          </button>

          <!-- Admin dropdown -->
          @if (isAdmin() && showAdminMenu()) {
            <div class="absolute right-0 top-full mt-2 w-52 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden z-50">
              <div class="px-3 py-2 bg-gray-50 border-b border-gray-100">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Administración</p>
              </div>
              <button
                type="button"
                (click)="navigateToScheduler()"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-colors hover:bg-gray-50 text-gray-600"
              >
                <i class="fas fa-calendar-check text-gray-400"></i>
                Programador
              </button>
              <button
                type="button"
                (click)="selectSection('teams')"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-colors hover:bg-gray-50"
                [class]="adminSection() === 'teams' ? 'text-gray-900 font-semibold bg-gray-50' : 'text-gray-600'"
              >
                <i class="fas fa-users text-gray-400"></i>
                Equipos
              </button>
            </div>
          }
        </div>

        <!-- Logout -->
        <button
          type="button"
          (click)="onLogout()"
          class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400
            hover:text-red-500 hover:bg-red-50 transition-all"
          title="Sign out"
        >
          <i class="fas fa-sign-out-alt text-sm"></i>
        </button>
      } @else {
        <a
          routerLink="/login"
          class="flex items-center gap-2 px-4 py-2 bg-gray-900 text-white text-sm font-medium
            rounded-xl hover:bg-gray-800 transition-all"
        >
          <i class="fas fa-sign-in-alt"></i>
          Login
        </a>
      }
    </div>
  </div>
</header>
